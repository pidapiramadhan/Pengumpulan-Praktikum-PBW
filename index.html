<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Pendaftaran</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 500px; margin: 20px auto; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; }
        input[type="text"], input[type="email"], select { width: 100%; padding: 8px; box-sizing: border-box; }
        .radio-group, .checkbox-group { background: #f9f9f9; padding: 10px; border-radius: 5px; }
        button { background: #4CAF50; color: white; padding: 10px 20px; border: none; cursor: pointer; }
        button:hover { background: #45a049; }
        .required:after { content: " *"; color: red; }
    </style>
</head>
<body>
    <h1>Form Pendaftaran</h1>
    
    <!-- Struktur form dengan method POST dan enctype untuk upload file -->
    <form action="daftar.php" method="post" enctype="multipart/form-data">
        <input type="hidden" name="submit" value="Submit">

        <!-- Nama - Input text dengan placeholder dan required -->
        <div class="form-group">
            <label for="nama" class="required">Nama</label>
            <input type="text" id="nama" name="nama" placeholder="Masukkan nama lengkap" maxlength="50" required>
        </div>

        <!-- Email - type="email" untuk validasi otomatis -->
        <div class="form-group">
            <label for="email" class="required">Email</label>
            <input type="email" id="email" name="email" placeholder="contoh@email.com" required>
        </div>

        <!-- Jenis Kelamin - Radio button (hanya bisa pilih satu) -->
        <div class="form-group">
            <label class="required">Jenis Kelamin</label>
            <div class="radio-group">
                <label><input type="radio" name="gender" value="Laki-laki" required> Laki-laki</label>
                <label><input type="radio" name="gender" value="Perempuan" required> Perempuan</label>
            </div>
        </div>

        <!-- Hobi - Checkbox dengan name[] untuk array di PHP -->
        <div class="form-group">
            <label>Hobi</label>
            <div class="checkbox-group">
                <label><input type="checkbox" name="hobi[]" value="Musik"> Musik</label>
                <label><input type="checkbox" name="hobi[]" value="Olahraga"> Olahraga</label>
                <label><input type="checkbox" name="hobi[]" value="Membaca"> Membaca</label>
            </div>
        </div>

        <!-- Pilih Kota - Dropdown -->
        <div class="form-group">
            <label for="kota" class="required">Pilih Kota</label>
            <select id="kota" name="kota" required>
                <option value="" disabled selected>-- Pilih Kota --</option>
                <option value="Jakarta">Jakarta</option>
                <option value="Bandung">Bandung</option>
                <option value="Surabaya">Surabaya</option>
            </select>
        </div>

        <!-- Upload Foto - File input dengan accept="image/*" -->
        <div class="form-group">
            <label for="foto" class="required">Upload Foto</label>
            <input type="file" id="foto" name="foto" accept="image/*" required>
        </div>

        <!-- Tombol Daftar -->
        <button type="submit">Daftar</button>
    </form>
</body>
</html>
